services:
  - type: web
    name: burrow-server
    runtime: rust
    buildCommand: cargo build --release -p burrow
    startCommand: ./target/release/burrow server
    envVars:
      - key: SERVER_SECRET
        generateValue: true          # Render auto-generates a random secret
      - key: PUBLIC_HOST
        value: burrow-server.onrender.com   # Change to your actual Render URL
      - key: RUST_LOG
        value: burrow_server=info
      - key: PORT
        value: 8080
      - key: MAX_BODY_BYTES
        value: 4194304
    healthCheckPath: /health
